services:
  - type: web
    name: rag-hybrid-search
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: RAG_GEMINI_API_KEY
        sync: false
      - key: RAG_NVIDIA_API_KEY
        sync: false
      - key: RAG_DATA_DIR
        value: /opt/render/project/data
      # Pinecone storage backend (Task 3.5, docs/superpowers/plans/2026-07-11-pinecone-storage-migration.md).
      # Leave RAG_STORAGE_BACKEND unset (defaults to "local") until Task 3.5's
      # verification steps are ready to run -- setting it to "pinecone" here
      # switches the live deployment's storage backend immediately on deploy.
      - key: RAG_STORAGE_BACKEND
        sync: false
      - key: RAG_PINECONE_API_KEY
        sync: false
      - key: RAG_PINECONE_INDEX_NAME
        sync: false
      - key: RAG_PINECONE_ENVIRONMENT
        sync: false
